name: Code Testing

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ['20.19', '22', '24', '25']
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node }}

            - run: npm ci --no-workspaces
            - run: npm run lint
            - run: npm test
